<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>I'm Sorry ❤️</title>
<style>
  :root{
    --deep-1:#001f54;
    --deep-2:#001a3d;
    --accent-1:#ff5a88;
    --accent-2:#ff7aa6;
    --glass: rgba(255,255,255,0.04);
    --text-soft: #e6f0ff;
  }
  html,body{ height:100%; margin:0; padding:0;
    font-family:"Segoe UI", Roboto, Arial, sans-serif;
    background: linear-gradient(135deg,var(--deep-1) 0%,var(--deep-2) 60%);
    color:var(--text-soft); overflow:hidden; }

  .container{
    position:relative; z-index:5; max-width:820px; margin:70px auto;
    padding:28px; text-align:center; background: var(--glass);
    border-radius:18px; box-shadow: 0 12px 40px rgba(0,0,0,0.55);
    backdrop-filter: blur(6px);
  }

  h1{ margin:0 0 8px; font-size:46px; color:#ffd6e0; letter-spacing:-1px; }
  p{ margin:8px 0; font-size:18px; color:var(--text-soft); }
  h3{ margin:16px 0 6px; color:#cfe8ff; }

  .btn{ padding:12px 26px; margin:10px; border-radius:28px; border:none;
    font-size:18px; cursor:pointer; box-shadow: 0 8px 20px rgba(0,0,0,0.45);
    transition: transform .12s ease, box-shadow .12s ease; }
  .btn:active{ transform: translateY(2px); box-shadow:0 6px 14px rgba(0,0,0,0.45); }

  #yes{ background: linear-gradient(90deg,var(--accent-1),var(--accent-2)); color:white; }
  #no{ background: rgba(255,255,255,0.95); color: #ff4d6d; position:relative; }

  .heart{ position: absolute; pointer-events:none; transform: translate(-50%,-50%);
    animation: floatUp linear infinite; will-change: transform, opacity;
    filter: drop-shadow(0 8px 20px rgba(0,0,0,0.45)); }
  @keyframes floatUp{ from{ transform: translateY(0) scale(1); opacity:1; }
    to{ transform: translateY(-1000px) scale(1.1); opacity:0; } }

  .music-control{ position: fixed; right:18px; bottom:18px; z-index:20;
    background: rgba(255,255,255,0.06); padding:10px 12px; border-radius:14px;
    color:var(--text-soft); font-size:15px; border: 1px solid rgba(255,255,255,0.04);
    cursor:pointer; box-shadow: 0 8px 24px rgba(0,0,0,0.45); }

  /* private note */
  #privateNote{
    margin-top:18px; padding:14px 18px; border-radius:12px;
    background: linear-gradient(90deg, rgba(255,255,255,0.03), rgba(255,255,255,0.02));
    color:#ffeef6; display:none; font-size:16px; box-shadow: 0 8px 20px rgba(0,0,0,0.45);
  }

  @media (max-width:520px){
    h1{ font-size:34px; } .container{ margin-top:40px; padding:18px; } .btn{ padding:10px 18px; font-size:16px; }
  }
</style>
</head>
<body>

<!-- Edit these two constants below if you want to change name/private line -->
<script>
  const herName = "My Princess"; // <-- already set to the name you gave me
  const privateLine = "P.S. You're the best thing that ever happened to me — forgive my dumb moments 💕";
</script>

<div class="container" id="mainBox">
  <h1 id="title">I'm Sorry, <span id="herName">Love</span> ❤️</h1>

  <p>I know I acted like I didn't care earlier.</p>
  <p>But the truth is… I do care about you a lot. I hate that I made you sad.</p>

  <h3>Will you forgive me? 🥺</h3>

  <button id="yes" class="btn" onclick="forgive()">Yes ❤️</button>
  <button id="no" class="btn">No</button>

  <div id="privateNote" aria-hidden="true"></div>
</div>

<button id="musicBtn" class="music-control" aria-pressed="false">⏵ Play Music</button>

<script>
/* ---------- insert name & private note element ---------- */
document.getElementById('herName').innerText = herName;
document.getElementById('privateNote').innerText = privateLine;

/* ---------- hearts ---------- */
function createHeart(special=false, x=null){
  const d = document.createElement('div');
  d.className = 'heart';
  d.innerText = '❤️';
  const size = Math.random() * (special?28:18) + (special?28:12);
  d.style.fontSize = size + 'px';
  const left = (x !== null) ? x : Math.random() * window.innerWidth;
  d.style.left = left + 'px';
  d.style.top = (window.innerHeight + 40) + 'px';
  d.style.animationDuration = (Math.random()*3 + (special?5:4)) + 's';
  document.body.appendChild(d);
  setTimeout(()=> d.remove(), (parseFloat(d.style.animationDuration)*1000)+400);
}
const heartInterval = setInterval(()=> createHeart(false), 420);

/* ---------- forgive action: reveal private line ---------- */
function forgive(){
  playChime();
  for(let i=0;i<18;i++) setTimeout(()=> createHeart(true, Math.random()*window.innerWidth), i*80);

  // reveal private note gently
  const note = document.getElementById('privateNote');
  note.style.display = 'block';
  note.style.opacity = 0;
  note.style.transform = 'translateY(10px)';
  note.style.transition = 'opacity .42s ease, transform .42s ease';
  setTimeout(()=> { note.style.opacity = 1; note.style.transform = 'translateY(0)'; }, 80);

  // friendly pop-up a moment later
  setTimeout(()=> alert("Thank you ❤️ You mean the world to me."), 450);
}

/* small chime using WebAudio */
let audioCtxForChime = null;
function playChime(){
  try{
    if(!audioCtxForChime) audioCtxForChime = new (window.AudioContext || window.webkitAudioContext)();
    const ctx = audioCtxForChime;
    const now = ctx.currentTime;
    const g = ctx.createGain(); g.connect(ctx.destination); g.gain.value = 0.0001;
    g.gain.exponentialRampToValueAtTime(0.5, now + 0.02);
    g.gain.exponentialRampToValueAtTime(0.0001, now + 1.2);

    const o = ctx.createOscillator(); o.type = 'sine'; o.frequency.value = 880;
    o.connect(g); o.start(now); o.stop(now + 1.1);

    const o2 = ctx.createOscillator(); const g2 = ctx.createGain(); g2.connect(ctx.destination);
    g2.gain.value = 0.0001; g2.gain.exponentialRampToValueAtTime(0.35, now + 0.02);
    g2.gain.exponentialRampToValueAtTime(0.0001, now + 1.3);
    o2.type = 'triangle'; o2.frequency.value = 1320; o2.connect(g2); o2.start(now + 0.02); o2.stop(now + 1.3);
  }catch(e){}
}

/* ---------- playful No button ---------- */
const noBtn = document.getElementById('no');
let lastMove = 0;

function distance(x1,y1,x2,y2){ const dx = x1-x2, dy = y1-y2; return Math.sqrt(dx*dx + dy*dy); }

function moveNoButton(fast=false){
  const now = Date.now();
  if(now - lastMove < (fast?120:70)) return;
  lastMove = now;
  const padding = 12;
  const bw = noBtn.offsetWidth || 100;
  const bh = noBtn.offsetHeight || 40;
  const maxX = Math.max(window.innerWidth - bw - padding, padding);
  const maxY = Math.max(window.innerHeight - bh - padding, padding);

  const cursor = window._lastCursor || {x: window.innerWidth/2, y: window.innerHeight/2};
  let newX, newY, attempts=0;
  do{
    newX = Math.floor(Math.random() * maxX) + padding;
    newY = Math.floor(Math.random() * maxY) + padding;
    attempts++;
  } while(distance(newX + bw/2, newY + bh/2, cursor.x, cursor.y) < (fast ? 260 : 140) && attempts < 12);

  if(fast){
    noBtn.style.transition = 'transform 0.22s ease, left 0.16s linear, top 0.16s linear';
    noBtn.style.transform = 'rotate(20deg) scale(0.98)';
    setTimeout(()=> noBtn.style.transform = 'rotate(-8deg) scale(1)', 180);
    setTimeout(()=> noBtn.style.transform = '', 360);
  }else{
    noBtn.style.transition = 'left 0.12s linear, top 0.12s linear';
  }

  noBtn.style.position = 'absolute';
  noBtn.style.left = newX + 'px';
  noBtn.style.top = newY + 'px';

  if(Math.random() < (fast ? 0.4 : 0.18)) spawnDecoy(newX, newY);
  playShortBeep();
}

function spawnDecoy(x,y){
  const d = document.createElement('button');
  d.className = 'btn';
  d.style.position = 'absolute';
  d.style.left = (x + (Math.random()*120 - 60)) + 'px';
  d.style.top = (y + (Math.random()*120 - 60)) + 'px';
  d.style.padding = '8px 12px';
  d.style.fontSize = '14px';
  d.style.borderRadius = '10px';
  d.style.background = 'rgba(255,255,255,0.92)';
  d.style.color = '#ff4d6d';
  d.style.zIndex = 30;
  d.innerText = 'No';
  document.body.appendChild(d);
  setTimeout(()=> d.remove(), 1200 + Math.random()*1000);
  d.animate([
    { transform: 'scale(0.8) translateY(0)' },
    { transform: 'scale(1.05) translateY(-8px)' },
    { transform: 'scale(1) translateY(0)' }
  ], { duration: 650, easing: 'ease-out' });
}

let beepCtx = null;
function playShortBeep(){
  try{
    if(!beepCtx) beepCtx = new (window.AudioContext || window.webkitAudioContext)();
    const ctx = beepCtx;
    const o = ctx.createOscillator();
    const g = ctx.createGain();
    o.type = 'sine';
    o.frequency.value = 600 + Math.random()*220;
    g.gain.value = 0.0001;
    o.connect(g); g.connect(ctx.destination);
    const now = ctx.currentTime;
    g.gain.exponentialRampToValueAtTime(0.28, now + 0.01);
    g.gain.exponentialRampToValueAtTime(0.0001, now + 0.12);
    o.start(now); o.stop(now + 0.13);
  }catch(e){}
}

window._lastCursor = {x: window.innerWidth/2, y: window.innerHeight/2};
window.addEventListener('mousemove', (ev) => {
  window._lastCursor = {x: ev.clientX, y: ev.clientY};
  const rect = noBtn.getBoundingClientRect();
  const cx = rect.left + rect.width/2;
  const cy = rect.top + rect.height/2;
  const d = distance(cx, cy, ev.clientX, ev.clientY);
  if(d < 140) moveNoButton(true);
});

noBtn.addEventListener('mouseenter', ()=> moveNoButton(true));
noBtn.addEventListener('click', ()=> alert("Haha noooo 😅 I can't accept that — but seriously, I'm sorry."));

/* clamp on resize */
window.addEventListener('resize', ()=>{
  if(noBtn.style.position === 'absolute') {
    const left = parseInt(noBtn.style.left||0,10);
    const top = parseInt(noBtn.style.top||0,10);
    const maxLeft = Math.max(window.innerWidth - noBtn.offsetWidth - 12, 12);
    const maxTop = Math.max(window.innerHeight - noBtn.offsetHeight - 12, 12);
    noBtn.style.left = Math.min(left, maxLeft) + 'px';
    noBtn.style.top = Math.min(top, maxTop) + 'px';
  }
});

/* ---------- ambient music with WebAudio (no external file) ---------- */
let audioStarted = false;
let musicCtx = null;
let masterGain = null;
let ambientNodes = [];
const musicBtn = document.getElementById('musicBtn');

function initAmbient(){
  if(audioStarted) return;
  try{
    musicCtx = new (window.AudioContext || window.webkitAudioContext)();
    masterGain = musicCtx.createGain();
    masterGain.gain.value = 0.0001;
    masterGain.connect(musicCtx.destination);

    for(let i=0;i<3;i++){
      const o = musicCtx.createOscillator();
      o.type = (i%2===0) ? 'sine' : 'sawtooth';
      const baseFreq = [220, 277.18, 329.63][i];
      o.frequency.setValueAtTime(baseFreq * (1 + (Math.random()*0.006 - 0.003)), musicCtx.currentTime);
      const g = musicCtx.createGain();
      g.gain.value = 0.0001;
      const filter = musicCtx.createBiquadFilter();
      filter.type = 'lowpass';
      filter.frequency.value = 1200 - i*240;
      o.connect(filter);
      filter.connect(g);
      g.connect(masterGain);
      ambientNodes.push({o,g,filter,baseFreq});
    }

    ambientNodes.forEach(n => {
      n.o.start();
      const now = musicCtx.currentTime;
      n.g.gain.setValueAtTime(0.0001, now);
      n.g.gain.linearRampToValueAtTime(0.06 + Math.random()*0.06, now + 2.2);
      n.filter.frequency.setValueAtTime(n.filter.frequency.value, now);
      n.filter.frequency.linearRampToValueAtTime(n.filter.frequency.value - 250 + Math.random()*500, now + 6);
    });

    masterGain.gain.linearRampToValueAtTime(0.22, musicCtx.currentTime + 4.2);

    setInterval(()=> {
      ambientNodes.forEach((n, idx) => {
        const t = musicCtx.currentTime;
        const det = Math.sin(t*0.08 + idx*0.6) * (0.6 + Math.random()*0.8);
        n.o.frequency.setValueAtTime(n.baseFreq + det, t);
        n.filter.frequency.linearRampToValueAtTime(900 + Math.sin(t*0.03 + idx)*250, t + 5);
      });
    }, 1200);

    audioStarted = true;
    musicBtn.innerText = '⏸ Pause Music';
    musicBtn.setAttribute('aria-pressed','true');

  }catch(e){
    musicBtn.style.display = 'none';
  }
}

function stopAmbient(){
  try{
    if(!audioStarted) return;
    const t = musicCtx.currentTime;
    masterGain.gain.cancelScheduledValues(t);
    masterGain.gain.setValueAtTime(masterGain.gain.value, t);
    masterGain.gain.linearRampToValueAtTime(0.0001, t + 1.2);
    setTimeout(()=> {
      ambientNodes.forEach(n => { try{ n.o.stop(); }catch(e){} });
      try{ musicCtx.close(); }catch(e){}
      musicCtx = null; masterGain = null; ambientNodes = []; audioStarted = false;
      musicBtn.innerText = '⏵ Play Music';
      musicBtn.setAttribute('aria-pressed','false');
    }, 1400);
  }catch(e){}
}

async function tryAutoplay(){
  try{
    if(!audioStarted){
      initAmbient();
      if(musicCtx && musicCtx.state === 'suspended'){
        await musicCtx.resume();
      }
    }
  }catch(e){
    musicBtn.innerText = '⏵ Play Music';
    musicBtn.setAttribute('aria-pressed','false');
  }
}

musicBtn.addEventListener('click', async ()=>{
  if(!audioStarted){
    try{
      await initAmbient();
      if(musicCtx && musicCtx.state === 'suspended') await musicCtx.resume();
      audioStarted = true;
    }catch(e){}
    musicBtn.innerText = '⏸ Pause Music';
    musicBtn.setAttribute('aria-pressed','true');
  } else {
    stopAmbient();
  }
});

window.addEventListener('load', () => {
  tryAutoplay();
  setTimeout(()=> { try{ if(audioStarted) playChime(); }catch(e){} }, 1800);
});

/* ---------- init No button starting position ---------- */
(function initNoPosition(){
  const startX = Math.max(Math.min(window.innerWidth * 0.6, window.innerWidth-160), 80);
  const startY = Math.max(Math.min(window.innerHeight * 0.55, window.innerHeight-140), 90);
  noBtn.style.position = 'absolute';
  noBtn.style.left = startX + 'px';
  noBtn.style.top  = startY + 'px';
})();
</script>
</body>
</html>
